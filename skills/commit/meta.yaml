name: commit
version: 0.1.0
category: workflow
summary: Create clean conventional commits with staged change review and user approval before committing.
summary_vi: "T\u1EA1o commit theo chu\u1EA9n conventional v\u1EDBi review thay \u0111\u1ED5i staged v\xE0 x\xE1c nh\u1EADn t\u1EEB user tr\u01B0\u1EDBc khi commit."
triggers:
  - commit these changes
  - save my work
  - ready to commit
inputs:
  - staged git changes
  - optional task or issue reference
outputs:
  - conventional commit message
  - user approval gate
  - committed changes
constraints:
  - never auto-commit without approval
  - one concern per commit
related_skills:
  - using-skills
  - verification-before-completion
  - code-review
  - extract
