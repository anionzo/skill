name: spec
version: 0.1.0
category: planning
summary: Create a feature specification through Socratic exploration, locking decisions before implementation begins.
summary_vi: "T\u1EA1o spec cho feature qua kh\xE1m ph\xE1 Socratic, kh\xF3a quy\u1EBFt \u0111\u1ECBnh tr\u01B0\u1EDBc khi b\u1EAFt \u0111\u1EA7u implement."
triggers:
  - spec this feature
  - define requirements
  - what should we build
  - create a specification
inputs:
  - feature name or description
  - user requirements and constraints
outputs:
  - locked decisions
  - spec document with requirements and ACs
  - approval status
constraints:
  - ask one question at a time during exploration
  - do not skip the review step
related_skills:
  - using-skills
  - planning
  - brainstorming
  - go-pipeline
  - feature-delivery
